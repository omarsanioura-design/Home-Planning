<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>HomeWise · Household Budget</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F5F6FA" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <!-- ════════════════════════════════════════════
       ⚙️  FIREBASE CONFIG — replace with yours!
       1. Go to https://console.firebase.google.com
       2. Create a project → Add Web App
       3. Copy the firebaseConfig object values below
       4. Enable Authentication → Email/Password
       5. Enable Firestore Database (start in test mode)
  ════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, collection, addDoc, deleteDoc, onSnapshot, setDoc, getDoc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ▼▼▼ PASTE YOUR FIREBASE CONFIG HERE ▼▼▼
   const firebaseConfig = {
  apiKey: "AIzaSyAIp0oDFqSm1Z7WZ6hPnnGKplSr-fE0Q2w",
  authDomain: "home-planning-dcbe4.firebaseapp.com",
  projectId: "home-planning-dcbe4",
  storageBucket: "home-planning-dcbe4.firebasestorage.app",
  messagingSenderId: "60029284932",
  appId: "1:60029284932:web:07c9485bb19ad650850211",
  measurementId: "G-FRBM0MHLMF"
};
    // ▲▲▲ END OF CONFIG ▲▲▲

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ── State ──────────────────────────────────
    const CATEGORIES = [
      { name:"Rent",         icon:"🏠", color:"#FF6B6B" },
      { name:"Groceries",    icon:"🛒", color:"#FFB347" },
      { name:"Pet Expenses", icon:"🐾", color:"#C8A96E" },
      { name:"Baby Products",icon:"🍼", color:"#F9C784" },
      { name:"Eating Out",   icon:"🍽️", color:"#FF8C69" },
      { name:"Transport",    icon:"🚗", color:"#4ECDC4" },
      { name:"Gas",          icon:"⛽", color:"#F4A261" },
      { name:"Insurance",    icon:"🛡️", color:"#6C9BCF" },
      { name:"Utilities",    icon:"💡", color:"#45B7D1" },
      { name:"Debt",         icon:"💳", color:"#E07B7B" },
      { name:"Entertainment",icon:"🎬", color:"#DDA0DD" },
      { name:"Savings",      icon:"🏦", color:"#98D8C8" },
      { name:"Other",        icon:"📦", color:"#B0B0B0" },
    ];
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const SHORT  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    let currentUser = null;
    let householdId = null;
    let unsubTx = null, unsubSettings = null;

    let state = {
      tab: "dashboard",
      cardIdx: 0,
      graphCat: "Rent",
      budgetSubTab: "budgets",  // budgets | recurring
      graphType: "bar",
      selectedCatMonth: null,
      selectedBveMonth: null,
      recurring: [],    // array of recurring expense definitions
      month: new Date().getMonth(),
      year:  new Date().getFullYear(),
      transactions: [],
      allTransactions: [],
      budgets: {},
      budgetOverrides: {},
      income: 0,
      members: [],
      authMode: "login",   // login | register | forgot
      loading: true,
      toast: null,
    };

    // ── Helpers ───────────────────────────────
    const fmt = n => "$" + Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    const catColor = name => (CATEGORIES.find(c=>c.name===name)||{color:"#999"}).color;
    const catIcon  = name => (CATEGORIES.find(c=>c.name===name)||{icon:"💰"}).icon;

    function showToast(msg, type="success") {
      state.toast = { msg, type };
      render();
      setTimeout(()=>{ state.toast=null; render(); }, 3000);
    }

    // ── Firestore helpers ─────────────────────
    function txPath()       { return `households/${householdId}/transactions`; }
    function settingsPath() { return `households/${householdId}/settings/main`; }

    async function getOrCreateHousehold(uid, email) {
      // User doc stores which household they belong to
      const userRef = doc(db, "users", uid);
      const snap = await getDoc(userRef);
      if (snap.exists() && snap.data().householdId) {
        return snap.data().householdId;
      }
      // Create new household
      const hid = uid; // owner's UID is the household ID
      await setDoc(doc(db, "households", hid, "settings", "main"), {
        income: 0, budgets: {}, members: [email]
      });
      await setDoc(userRef, { householdId: hid, email });
      return hid;
    }

    async function joinHousehold(code) {
      // code = householdId of another user
      const hSnap = await getDoc(doc(db, "households", code, "settings", "main"));
      if (!hSnap.exists()) return false;
      // Update our user doc
      await setDoc(doc(db, "users", currentUser.uid), { householdId: code, email: currentUser.email }, {merge:true});
      // Add email to members list
      const members = hSnap.data().members || [];
      if (!members.includes(currentUser.email)) {
        await setDoc(doc(db, "households", code, "settings", "main"), { members: [...members, currentUser.email] }, {merge:true});
      }
      return true;
    }

    function subscribeToHousehold() {
      if (unsubTx) unsubTx();
      if (unsubSettings) unsubSettings();

      const { month, year } = state;

      // Fetch ALL transactions — filter by month/year in the render layer
      // so the graphs tab always has access to the full year's data
      const q = query(collection(db, txPath()), orderBy("createdAt","desc"));
      unsubTx = onSnapshot(q, snap => {
        const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // Monthly view for Overview / History / Add tabs
        state.transactions     = all.filter(t => t.month === month && t.year === year);
        // Full dataset for Graphs tab — all years, all months
        state.allTransactions  = all;
        render();
      });

      unsubSettings = onSnapshot(doc(db, settingsPath()), snap => {
        if (snap.exists()) {
          const d = snap.data();
          state.income          = d.income          || 0;
          state.budgets         = d.budgets         || {};
          state.budgetOverrides = d.budgetOverrides || {};
          state.members         = d.members         || [];
          state.recurring       = d.recurring       || [];
          render();
        }
      });
    }

    async function addTransaction(desc, amount, category, type) {
      if (!householdId) return;
      await addDoc(collection(db, txPath()), {
        description: desc, amount: parseFloat(amount),
        category, type,
        month: state.month, year: state.year,
        addedBy: currentUser.email,
        createdAt: Date.now()
      });
    }

    async function deleteTransaction(id) {
      await deleteDoc(doc(db, txPath(), id));
    }

    async function saveSettings(income, budgets) {
      await setDoc(doc(db, settingsPath()), { income, budgets, members: state.members }, {merge:true});
    }

    // Save budget for a specific month — carries forward to future months unless overridden
    async function saveMonthBudget(category, value) {
      const { month, year } = state;
      const key = `budget_${year}_${month}`;
      // Store as month-specific override
      const overrides = state.budgetOverrides || {};
      overrides[key] = { ...(overrides[key] || {}), [category]: value };
      state.budgetOverrides = overrides;
      await setDoc(doc(db, settingsPath()), { budgetOverrides: overrides }, {merge:true});
    }

    async function saveBaseIncome(income) {
      await setDoc(doc(db, settingsPath()), { income, members: state.members }, {merge:true});
    }

    // Get the effective budget for the current month:
    // Use month-specific override if it exists, otherwise walk back month by month
    // to find the most recent override, then fall back to the base budgets object
    function getEffectiveBudgets() {
      const { month, year } = state;
      const overrides = state.budgetOverrides || {};
      const base      = state.budgets || {};

      // Build result: for each category, find most recent override <= current month
      const result = {};
      CATEGORIES.forEach(cat => {
        // Look for an override in current month, then walk backwards up to 24 months
        let found = null;
        for (let m = month, y = year, i = 0; i < 24; i++) {
          const key = `budget_${y}_${m}`;
          if (overrides[key] && overrides[key][cat.name] !== undefined) {
            found = overrides[key][cat.name];
            break;
          }
          // Step back one month
          if (m === 0) { m = 11; y--; } else { m--; }
        }
        result[cat.name] = found !== null ? found : (base[cat.name] || 0);
      });
      return result;
    }

    // ── Recurring helpers ────────────────────────────────────
    async function saveRecurring(list) {
      state.recurring = list;
      await setDoc(doc(db, settingsPath()), { recurring: list }, {merge:true});
    }

    // Get total forecast recurring spend for a category in a given month/year
    function forecastForCategory(cat, month, year) {
      return (state.recurring || [])
        .filter(r => r.category === cat && r.active !== false)
        .reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    }

    // Get all recurring items for a category
    function recurringForCategory(cat) {
      return (state.recurring || []).filter(r => r.category === cat && r.active !== false);
    }

    // Auto-post recurring transactions for the current month if not already posted
    async function autoPostRecurring(month, year) {
      const existing = state.allTransactions || state.transactions;
      for (const r of (state.recurring || [])) {
        if (r.active === false) continue;
        // Check if already posted this month
        const alreadyPosted = existing.some(t =>
          t.recurringId === r.id && t.month === month && t.year === year
        );
        if (!alreadyPosted) {
          await addDoc(collection(db, txPath()), {
            description: r.name,
            amount: parseFloat(r.amount),
            category: r.category,
            type: "expense",
            month, year,
            addedBy: "recurring",
            recurringId: r.id,
            createdAt: Date.now()
          });
        }
      }
    }

    // ── Auth ──────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        householdId = await getOrCreateHousehold(user.uid, user.email);
        subscribeToHousehold();
        state.loading = false;
        state.tab = "dashboard";
        // Auto-post any recurring expenses for current month
        const now = new Date();
        setTimeout(() => autoPostRecurring(now.getMonth(), now.getFullYear()), 2000);
      } else {
        currentUser = null;
        householdId = null;
        if (unsubTx) unsubTx();
        if (unsubSettings) unsubSettings();
        state.loading = false;
        state.tab = "auth";
        state.transactions = [];
      }
      render();
    });

    // ── Render ────────────────────────────────
    function render() {
      const root = document.getElementById("root");
      if (!root) return;

      if (state.loading) {
        root.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F6FA;flex-direction:column;gap:16px">
            <div style="font-family:Syne,sans-serif;font-size:22px;color:#5B6EF5;font-weight:800;letter-spacing:-1px">HomeWise</div>
            <div style="width:32px;height:32px;border:3px solid #E8EAF0;border-top-color:#5B6EF5;border-radius:50%;animation:spin 0.8s linear infinite"></div>
          </div>`;
        return;
      }

      if (state.tab === "auth") { renderAuth(root); return; }
      if (state.tab === "household") { renderHousehold(root); return; }
      renderApp(root);
    }

    // ── Auth Screen ───────────────────────────
    function renderAuth(root) {
      const isReg    = state.authMode === "register";
      const isForgot = state.authMode === "forgot";

      root.innerHTML = `
        <div style="min-height:100vh;background:#F5F6FA;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;box-sizing:border-box">

          <!-- Logo -->
          <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:36px">
            <div style="width:56px;height:56px;background:linear-gradient(135deg,#5B6EF5,#3B4FD8);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 16px #5B6EF540;overflow:hidden"><svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="26" width="26" height="20" rx="2" fill="white" fill-opacity="0.25"/>
                <path d="M7 27L23 10L39 27" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="19" y="34" width="8" height="12" rx="1.5" fill="white" fill-opacity="0.4"/>
                <circle cx="39" cy="39" r="12" fill="white" fill-opacity="0.2"/>
                <circle cx="39" cy="39" r="12" stroke="white" stroke-width="2"/>
                <text x="39" y="44" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="DM Sans,sans-serif">$</text>
              </svg></div>
            <div style="font-family:Syne,sans-serif;font-size:28px;color:#1A1D2E;font-weight:800;letter-spacing:-1px">HomeWise</div>
            <div style="color:#8891A5;font-size:13px;margin-top:4px;letter-spacing:.5px">Home finance made easy</div>
          </div>

          <!-- Card -->
          <div style="width:100%;max-width:360px;background:#FFFFFF;border-radius:20px;padding:28px;border:1px solid #E8EAF0;box-shadow:0 4px 20px #0000000f">

            ${isForgot ? `
              <!-- Forgot Password -->
              <div style="text-align:center;margin-bottom:20px">
                <div style="font-size:32px;margin-bottom:10px">🔑</div>
                <div style="font-size:18px;font-weight:700;color:#1A1D2E;margin-bottom:6px">Reset Password</div>
                <div style="font-size:13px;color:#8891A5;line-height:1.5">Enter your email address and we'll send you a link to reset your password.</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:12px">
                <input id="forgot-email" type="email" placeholder="Email address" style="${inputStyle()}" />
                <button id="forgot-submit" style="${btnStyle()}">Send Reset Link</button>
              </div>
              <div style="text-align:center;margin-top:18px">
                <span id="back-to-login" style="color:#5B6EF5;cursor:pointer;font-size:13px;font-weight:600">← Back to Sign In</span>
              </div>
            ` : `
              <!-- Login / Register -->
              <div style="font-size:18px;font-weight:700;color:#1A1D2E;margin-bottom:6px">${isReg ? "Create Account" : "Welcome back"}</div>
              <div style="font-size:13px;color:#8891A5;margin-bottom:22px">${isReg ? "Sign up to start tracking your household budget." : "Sign in to your account to continue."}</div>
              <div style="display:flex;flex-direction:column;gap:12px">
                ${isReg ? `<input id="auth-name" placeholder="Your name" style="${inputStyle()}" />` : ""}
                <input id="auth-email" type="email" placeholder="Email address" style="${inputStyle()}" />
                <div>
                  <input id="auth-pass" type="password" placeholder="Password" style="${inputStyle()}" ${isReg ? 'oninput="updatePassStrength()"' : ""} />
                  ${isReg ? `<div id="pass-rules" style="display:none;margin-top:8px;display:flex;flex-direction:column;gap:4px">
                    <div id="rule-len"  style="font-size:11px;color:#8891A5">○ At least 8 characters</div>
                    <div id="rule-upper" style="font-size:11px;color:#8891A5">○ At least 1 uppercase letter</div>
                    <div id="rule-num"  style="font-size:11px;color:#8891A5">○ At least 1 number</div>
                  </div>` : `<div id="login-error" style="display:none;font-size:12px;color:#EF4444;margin-top:6px;font-weight:500">⚠ Incorrect email or password. Please try again.</div>`}
                </div>
                ${isReg ? `
                <div>
                  <input id="auth-pass-confirm" type="password" placeholder="Re-enter password" style="${inputStyle()}" oninput="updatePassMatch()" />
                  <div id="pass-match-msg" style="font-size:11px;margin-top:5px;display:none"></div>
                </div>` : ""}
                ${!isReg ? `<div style="text-align:right;margin-top:-4px"><span id="forgot-link" style="font-size:12px;color:#5B6EF5;cursor:pointer;font-weight:500">Forgot password?</span></div>` : ""}
                <button id="auth-submit" style="${btnStyle()}">${isReg ? "Create Account" : "Sign In"}</button>
              </div>
              <div style="text-align:center;margin-top:18px;color:#8891A5;font-size:13px">
                ${isReg ? "Already have an account?" : "No account yet?"}
                <span id="auth-toggle" style="color:#5B6EF5;cursor:pointer;margin-left:6px;font-weight:600">${isReg ? "Sign In" : "Create one"}</span>
              </div>
            `}
          </div>
        </div>`;

      if (isForgot) {
        document.getElementById("forgot-submit").onclick = async () => {
          const email = document.getElementById("forgot-email").value.trim();
          const btn   = document.getElementById("forgot-submit");
          if (!email) { showToast("Please enter your email address", "error"); return; }
          btn.textContent = "Sending…"; btn.disabled = true;
          try {
            await sendPasswordResetEmail(auth, email);
            root.innerHTML = `
              <div style="min-height:100vh;background:#F5F6FA;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;box-sizing:border-box">
                <div style="width:100%;max-width:360px;background:#FFFFFF;border-radius:20px;padding:36px 28px;border:1px solid #E8EAF0;box-shadow:0 4px 20px #0000000f;text-align:center">
                  <div style="font-size:48px;margin-bottom:16px">📬</div>
                  <div style="font-size:18px;font-weight:700;color:#1A1D2E;margin-bottom:10px">Check your inbox</div>
                  <div style="font-size:13px;color:#8891A5;line-height:1.6;margin-bottom:24px">We've sent a password reset link to <strong style="color:#1A1D2E">${email}</strong>. Check your email and follow the link to reset your password.</div>
                  <button id="back-login-btn" style="${btnStyle()}">Back to Sign In</button>
                </div>
              </div>`;
            document.getElementById("back-login-btn").onclick = () => { state.authMode = "login"; render(); };
          } catch(e) {
            showToast(e.message.replace("Firebase: ","").replace(/\(.*\)/,""), "error");
            btn.textContent = "Send Reset Link"; btn.disabled = false;
          }
        };
        document.getElementById("back-to-login").onclick = () => { state.authMode = "login"; render(); };
      } else {
        document.getElementById("auth-toggle").onclick = () => {
          state.authMode = isReg ? "login" : "register";
          render();
        };
        if (!isReg) {
          document.getElementById("forgot-link").onclick = () => { state.authMode = "forgot"; render(); };
          // Clear error on retype
          ["auth-email","auth-pass"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.oninput = () => {
              const errDiv = document.getElementById("login-error");
              if (errDiv) errDiv.style.display = "none";
              const passInput = document.getElementById("auth-pass");
              if (passInput) passInput.style.borderColor = "#DDE0EA";
            };
          });
        }
        if (isReg) {
          // Strength helpers
          window.updatePassStrength = () => {
            const p = document.getElementById("auth-pass").value;
            const rules = document.getElementById("pass-rules");
            if (rules) rules.style.display = p.length > 0 ? "flex" : "none";
            const setRule = (id, ok) => {
              const el = document.getElementById(id);
              if (el) { el.textContent = (ok ? "✅" : "○") + el.textContent.slice(1); el.style.color = ok ? "#10B981" : '#8891A5'; }
            };
            setRule("rule-len",   p.length >= 8);
            setRule("rule-upper", /[A-Z]/.test(p));
            setRule("rule-num",   /[0-9]/.test(p));
            const input = document.getElementById("auth-pass");
            if (input) input.style.borderColor = p.length===0 ? "#DDE0EA" : (/[A-Z]/.test(p) && /[0-9]/.test(p) && p.length>=8) ? "#10B981" : "#EF4444";
          };
          window.updatePassMatch = () => {
            const p  = document.getElementById("auth-pass").value;
            const pc = document.getElementById("auth-pass-confirm").value;
            const msg = document.getElementById("pass-match-msg");
            const inp = document.getElementById("auth-pass-confirm");
            if (!msg || !inp) return;
            msg.style.display = pc.length > 0 ? "block" : "none";
            const match = p === pc;
            msg.textContent = match ? "✅ Passwords match" : "⚠ Passwords do not match";
            msg.style.color = match ? "#10B981" : "#EF4444";
            inp.style.borderColor = pc.length===0 ? "#DDE0EA" : match ? "#10B981" : "#EF4444";
          };
        }

        document.getElementById("auth-submit").onclick = async () => {
          const email = document.getElementById("auth-email").value.trim();
          const pass  = document.getElementById("auth-pass").value;
          const btn   = document.getElementById("auth-submit");

          if (isReg) {
            const passStrong = /[A-Z]/.test(pass) && /[0-9]/.test(pass) && pass.length >= 8;
            if (!passStrong) { showToast("Password must be 8+ chars with 1 uppercase and 1 number", "error"); return; }
            const passConf = document.getElementById("auth-pass-confirm").value;
            if (pass !== passConf) { showToast("Passwords do not match", "error"); return; }
          }

          btn.textContent = "…"; btn.disabled = true;
          try {
            if (isReg) {
              const name = document.getElementById("auth-name").value.trim();
              const cred = await createUserWithEmailAndPassword(auth, email, pass);
              await updateProfile(cred.user, { displayName: name });
            } else {
              await signInWithEmailAndPassword(auth, email, pass);
            }
          } catch(e) {
            if (!isReg) {
              const errDiv = document.getElementById("login-error");
              if (errDiv) errDiv.style.display = "block";
              const passInput = document.getElementById("auth-pass");
              if (passInput) passInput.style.borderColor = "#EF4444";
            } else {
              showToast(e.message.replace("Firebase: ","").replace(/\(.*\)/,""), "error");
            }
            btn.textContent = isReg ? "Create Account" : "Sign In"; btn.disabled = false;
          }
        };
      }
    }

    // ── Household join screen ─────────────────
    function renderHousehold(root) {
      root.innerHTML = `
        <div style="min-height:100vh;background:#F5F6FA;padding:32px 24px;box-sizing:border-box;max-width:430px;margin:0 auto">
          <button id="back-btn" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:8px 14px;cursor:pointer;margin-bottom:24px;font-family:inherit">← Back</button>
          <div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin-bottom:6px">Household Settings</div>
          <div style="color:#5a5a7a;font-size:13px;margin-bottom:28px">Share your code or enter someone else's to sync budgets</div>

          <div style="${cardStyle()}">
            <div style="font-size:11px;letter-spacing:2px;color:#8888aa;text-transform:uppercase;margin-bottom:10px">Your Household Code</div>
            <div style="font-family:monospace;font-size:16px;background:#F5F6FA;border-radius:10px;padding:14px 16px;letter-spacing:2px;color:#5B6EF5;margin-bottom:10px;word-break:break-all">${householdId}</div>
            <button id="copy-code" style="${btnStyle("#4ECDC4")}">Copy Code</button>
          </div>

          <div style="${cardStyle()}margin-top:12px">
            <div style="font-size:11px;letter-spacing:2px;color:#8888aa;text-transform:uppercase;margin-bottom:10px">Join Another Household</div>
            <div style="font-size:12px;color:#8888aa;margin-bottom:12px">Enter the code from your household member to share their budget data.</div>
            <input id="join-code" placeholder="Paste household code here" style="${inputStyle()}margin-bottom:10px" />
            <button id="join-btn" style="${btnStyle()}">Join Household</button>
          </div>

          <div style="${cardStyle()}margin-top:12px">
            <div style="font-size:11px;letter-spacing:2px;color:#8888aa;text-transform:uppercase;margin-bottom:10px">Current Members</div>
            ${state.members.map(m=>`<div style="padding:8px 0;border-bottom:1px solid #ffffff08;font-size:14px;color:#1A1D2E">👤 ${m}</div>`).join("")}
          </div>

          <button id="signout-btn" style="${btnStyle("#333344")}margin-top:20px">Sign Out</button>
        </div>`;

      document.getElementById("back-btn").onclick = () => { state.tab="dashboard"; render(); };
      document.getElementById("copy-code").onclick = () => {
        navigator.clipboard.writeText(householdId).then(()=>showToast("Code copied!")).catch(()=>showToast("Copy failed","error"));
      };
      document.getElementById("signout-btn").onclick = () => signOut(auth);
      document.getElementById("join-btn").onclick = async () => {
        const code = document.getElementById("join-code").value.trim();
        if (!code) return;
        const ok = await joinHousehold(code);
        if (ok) {
          householdId = code;
          subscribeToHousehold();
          showToast("Joined household!");
          state.tab = "dashboard"; render();
        } else {
          showToast("Household not found","error");
        }
      };
    }

    // ── Main App ──────────────────────────────
    function renderApp(root) {
      const { tab, month, year, transactions, income } = state;
      const expenses = transactions.filter(t=>t.type==="expense");
      const totalExp = expenses.reduce((s,t)=>s+t.amount,0);
      // Use effective income for this month (carry-forward override)
      let effectiveMonthIncome = income;
      const _overrides = state.budgetOverrides || {};
      for (let m=month, y=year, i=0; i<24; i++) {
        const k = `budget_${y}_${m}`;
        if (_overrides[k] && _overrides[k]["__income__"] !== undefined) { effectiveMonthIncome = _overrides[k]["__income__"]; break; }
        if (m===0){m=11;y--;}else m--;
      }
      const totalInc = transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0) + effectiveMonthIncome;
      const budgets      = getEffectiveBudgets();
      const balance      = totalInc - totalExp;
      const totalBudget  = Object.values(budgets).reduce((s,v)=>s+v,0);
      const budgetVsAct  = totalBudget - totalExp;

      const spentByCat = name => expenses.filter(t=>t.category===name).reduce((s,t)=>s+t.amount,0);

      root.innerHTML = `
        <div id="app" style="font-family:'DM Sans',sans-serif;background:#F5F6FA;min-height:100vh;max-width:430px;margin:0 auto;color:#1A1D2E;padding-bottom:80px">

          ${state.toast ? `<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:${state.toast.type==="error"?"#EF4444":"#10B981"};color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px #00000040">${state.toast.msg}</div>` : ""}

          <!-- Header -->
          <div style="background:#FFFFFF;padding:20px 20px 16px;border-bottom:1px solid #E8EAF0;box-shadow:0 1px 8px #0000000a">
            <div style="display:flex;align-items:center;margin-bottom:16px;gap:0">
              <div style="display:flex;align-items:center;gap:10;flex:1;min-width:0">
                ${tab==="graphs" ? `
                  <button id="prev-year" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:16px">‹</button>
                  <span style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;color:#1A1D2E;flex:1;text-align:center">${year} YTD</span>
                  <button id="next-year" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:16px">›</button>
                ` : `
                <button id="prev-month" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:16px">‹</button>
                <span style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;color:#1A1D2E;flex:1;text-align:center">${SHORT[month]} ${year}</span>
                <button id="next-month" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 13px;cursor:pointer;font-size:16px">›</button>`}
              </div>
              <div style="padding-left:20px;flex-shrink:0"><button id="household-btn" title="Household settings" style="background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:18px">👥</button></div>
            </div>
          </div>

          <!-- Tab Content -->
          ${tab==="dashboard"  ? renderDashboard(expenses, spentByCat, budgets) : ""}
          ${tab==="add"        ? renderAdd() : ""}
          ${tab==="transactions"? renderTransactions(transactions) : ""}
          ${tab==="budget"     ? renderBudget(income) : ""}
          ${tab==="graphs"     ? renderGraphs(state.allTransactions || state.transactions, state.graphCat, state.graphType, state.year) : ""}

          <!-- Nav -->
          <nav style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#FFFFFF;border-top:1px solid #E8EAF0;display:flex;z-index:100;box-shadow:0 -2px 12px #0000000a">
            ${[["dashboard","📊","Overview"],["add","➕","Add"],["transactions","🧾","History"],["graphs","📈","Graphs"],["budget","🎯","Budgets"]]
              .map(([id,ic,lb])=>`<button data-tab="${id}" style="flex:1;padding:12px 0 8px;border:none;background:transparent;color:${tab===id?"#5B6EF5":'#8891A5'};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;letter-spacing:.5px;font-family:inherit;transition:color .2s"><span style="font-size:20px">${ic}</span>${lb}</button>`).join("")}
          </nav>
        </div>`;

      // Nav
      root.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { state.tab = btn.dataset.tab; render(); };
      });
      if (document.getElementById("prev-month")) {
        document.getElementById("prev-month").onclick = () => {
          if (state.month===0){state.month=11;state.year--;} else state.month--;
          subscribeToHousehold(); render();
        };
        document.getElementById("next-month").onclick = () => {
          if (state.month===11){state.month=0;state.year++;} else state.month++;
          subscribeToHousehold(); render();
        };
      }
      if (document.getElementById("prev-year")) {
        document.getElementById("prev-year").onclick = () => { state.year--; render(); };
        document.getElementById("next-year").onclick = () => { state.year++; render(); };
      }
      document.getElementById("household-btn").onclick = () => { state.tab="household"; render(); };


      // Card swipe (dashboard only)
      const slider = document.getElementById("card-slider");
      if (slider) {
        let startX = 0;
        slider.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, {passive:true});
        slider.addEventListener("touchend", e => {
          const dx = e.changedTouches[0].clientX - startX;
          if (dx < -40) state.cardIdx = 1;
          if (dx >  40) state.cardIdx = 0;
          updateCardUI();
        }, {passive:true});
        document.querySelectorAll("[data-dot]").forEach(dot => {
          dot.onclick = () => { state.cardIdx = parseInt(dot.dataset.dot); updateCardUI(); };
        });
        updateCardUI();
      }
      function updateCardUI() {
        const track = document.getElementById("card-track");
        if (track) track.style.transform = `translateX(${state.cardIdx * -100}%)`;
        document.querySelectorAll("[data-dot]").forEach(dot => {
          const i = parseInt(dot.dataset.dot);
          dot.style.width = state.cardIdx === i ? "18px" : "6px";
          dot.style.background = state.cardIdx === i ? "#5B6EF5" : "#DDE0EA";
        });
      }

      // Add tx form
      if (tab==="add") bindAddForm();
      if (tab==="budget") bindBudgetForm(income);
      if (tab==="transactions") bindDeleteButtons();
      if (tab==="graphs") bindGraphs();
      if (tab==="budget")    { bindBudgetForm(income); bindRecurring(); }
    }

    function renderDashboard(expenses, spentByCat, budgets) {
      const totalExp    = expenses.reduce((s,t)=>s+t.amount,0);
      const totalInc    = state.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0) + state.income;
      const balance     = totalInc - totalExp;
      const totalBudget = Object.values(budgets).reduce((s,v)=>s+v,0);
      const budgetVsAct = totalBudget - totalExp;

      const metricCards = `
        <div style="padding:16px 20px 0">
          <div id="card-slider" style="position:relative;overflow:hidden;border-radius:16px;touch-action:pan-y">
            <div id="card-track" style="display:flex;transform:translateX(0%);transition:transform 0.35s cubic-bezier(.4,0,.2,1)">
              <!-- Card 0: Balance -->
              <div style="min-width:100%;background:#1E2A3A;border-radius:16px;padding:18px 20px;box-shadow:0 2px 8px #0000000f;border:1px solid #1E2A3A;box-sizing:border-box">
                <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#94A3B8;margin-bottom:6px">Balance</div>
                <div style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:700;margin:4px 0 14px;letter-spacing:-0.5px;color:${balance>=0?"#10B981":"#EF4444"}">${fmt(balance)}</div>
                <div style="display:flex;align-items:stretch">
                  <div style="flex:1 1 0;min-width:0"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#94A3B8;white-space:nowrap">↑ Income</div><div style="font-size:15px;font-weight:600;color:#10B981;margin-top:3px;white-space:nowrap">${fmt(totalInc)}</div></div>
                  <div style="width:1px;background:#E8EAF0;flex-shrink:0;margin:0 14px"></div>
                  <div style="flex:1 1 0;min-width:0;text-align:right"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#94A3B8;white-space:nowrap">↓ Expenses</div><div style="font-size:15px;font-weight:600;color:#EF4444;margin-top:3px;white-space:nowrap">${fmt(totalExp)}</div></div>
                </div>
              </div>
              <!-- Card 1: Budget vs Actuals -->
              <div style="min-width:100%;background:#1E2A3A;border-radius:16px;padding:18px 20px;box-shadow:0 2px 8px #0000000f;border:1px solid #1E2A3A;box-sizing:border-box">
                <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#94A3B8;margin-bottom:6px">Budget vs Actuals</div>
                <div style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:700;margin:4px 0 14px;letter-spacing:-0.5px;color:${budgetVsAct>=0?"#10B981":"#EF4444"}">${budgetVsAct>=0?"+":""}${fmt(budgetVsAct)}</div>
                <div style="display:flex;align-items:stretch">
                  <div style="flex:1 1 0;min-width:0"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#94A3B8;white-space:nowrap">📋 Budget</div><div style="font-size:15px;font-weight:600;color:#E2E8F0;margin-top:3px;white-space:nowrap">${fmt(totalBudget)}</div></div>
                  <div style="width:1px;background:#E8EAF0;flex-shrink:0;margin:0 14px"></div>
                  <div style="flex:1 1 0;min-width:0;text-align:right"><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#94A3B8;white-space:nowrap">↓ Expenses</div><div style="font-size:15px;font-weight:600;color:#EF4444;margin-top:3px;white-space:nowrap">${fmt(totalExp)}</div></div>
                </div>
              </div>
            </div>
            <!-- Dot indicators -->
            <div style="display:flex;justify-content:center;gap:6px;margin-top:10px" id="card-dots">
              <div data-dot="0" style="width:18px;height:6px;border-radius:3px;background:#5B6EF5;cursor:pointer;transition:all 0.3s"></div>
              <div data-dot="1" style="width:6px;height:6px;border-radius:3px;background:#DDE0EA;cursor:pointer;transition:all 0.3s"></div>
            </div>
          </div>
        </div>`;

      const rows = CATEGORIES.map(cat => {
        const spent = spentByCat(cat.name);
        const budget = budgets[cat.name]||0;
        if (spent===0 && budget===0) return "";
        const pct = budget>0 ? Math.min((spent/budget)*100,100) : 0;
        const over = spent>budget && budget>0;
        const forecast = forecastForCategory(cat.name, month, year);
        const forecastRemaining = Math.max(forecast - spent, 0);
        return `
          <div style="${cardStyle()}">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${budget>0||forecast>0?10:0}px">
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:38px;height:38px;border-radius:12px;background:${cat.color}22;display:flex;align-items:center;justify-content:center;font-size:18px">${cat.icon}</div>
                <div>
                  <div style="font-size:14px;font-weight:600">${cat.name}</div>
                  ${budget>0?`<div style="font-size:11px;color:#8891A5;margin-top:1px">${Math.round(pct)}% of budget</div>`:""}
                  ${forecast>0?`<div style="font-size:11px;color:#F59E0B;margin-top:1px">🔄 ${fmt(forecast)} recurring</div>`:""}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0;min-width:80px">
                <div style="font-size:14px;font-weight:600;color:${over?"#EF4444":"#1A1D2E"}">${fmt(spent)}</div>
                ${budget>0?`<div style="font-size:11px;color:#8891A5">of ${fmt(budget)}</div>`:""}
                ${forecast>0&&forecastRemaining>0?`<div style="font-size:11px;color:#F59E0B">+${fmt(forecastRemaining)} due</div>`:""}
              </div>
            </div>
            ${budget>0?`<div style="background:#F5F6FA;border-radius:4px;height:6px;overflow:hidden">
              <div style="height:100%;border-radius:4px;width:${pct}%;background:${over?"#EF4444":cat.color};transition:width .5s"></div>
            </div>`:""}
            ${forecast>0&&budget>0?`<div style="background:#FEF3C7;border-radius:4px;height:3px;overflow:hidden;margin-top:2px">
              <div style="height:100%;border-radius:4px;width:${Math.min((forecast/budget)*100,100)}%;background:#F59E0B;"></div>
            </div>`:""}
          </div>`;
      }).join("");
      return metricCards + `<div style="padding:16px 20px 8px">${sectionTitle("Spending by Category")}${rows||emptyState("📊","No expenses yet this month","Add transactions to see your spending")}</div>`;
    }

    function renderAdd() {
      return `<div style="padding:16px 20px 0">${sectionTitle("New Transaction")}
        <div style="${cardStyle()}">
          <div style="display:flex;gap:8px;margin-bottom:14px">
            <button id="type-expense" style="flex:1;padding:9px;border-radius:10px;border:none;background:#5B6EF5;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Expense</button>
            <button id="type-income"  style="flex:1;padding:9px;border-radius:10px;border:none;background:#F5F6FA;color:#8891A5;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Income</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <input id="tx-desc" placeholder="Description" style="${inputStyle()}" />
            <input id="tx-amt"  placeholder="Amount (e.g. 42.50)" type="number" style="${inputStyle()}" />
            <div id="cat-row">
              <select id="tx-cat" style="${inputStyle()}appearance:none">
                ${CATEGORIES.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join("")}
              </select>
            </div>
            <div id="income-note" style="display:none;background:#DCFCE7;border:1px solid #86EFAC;border-radius:10px;padding:10px 14px;font-size:12px;color:#166534;line-height:1.5">
              💰 Income will be added to your <strong>monthly income total</strong> for ${SHORT[month]} ${year}.
            </div>
            <button id="add-tx-btn" style="${btnStyle()}">Add Expense</button>
          </div>
        </div>
      </div>`;
    }

    function renderTransactions(transactions) {
      if (!transactions.length) return `<div style="padding:16px 20px 0">${sectionTitle("All Transactions")}${emptyState("🧾","No transactions yet","")}</div>`;
      const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `<div style="padding:16px 20px 0">${sectionTitle("All Transactions")}
        <!-- Confirm delete modal -->
        <div id="delete-modal" style="display:none;position:fixed;inset:0;background:#00000050;z-index:200;align-items:center;justify-content:center">
          <div style="background:#fff;border-radius:20px;padding:24px;margin:0 24px;box-shadow:0 20px 60px #00000030;max-width:360px;width:100%">
            <div style="font-size:28px;text-align:center;margin-bottom:12px">🗑️</div>
            <div style="font-size:16px;font-weight:700;color:#1A1D2E;text-align:center;margin-bottom:8px">Delete Transaction?</div>
            <div id="delete-modal-desc" style="font-size:13px;color:#8891A5;text-align:center;margin-bottom:20px;line-height:1.5"></div>
            <div style="display:flex;gap:10px">
              <button id="delete-cancel-btn" style="flex:1;padding:12px;border-radius:11px;border:1px solid #E8EAF0;background:#F5F6FA;color:#1A1D2E;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Cancel</button>
              <button id="delete-confirm-btn" style="flex:1;padding:12px;border-radius:11px;border:none;background:#EF4444;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Delete</button>
            </div>
          </div>
        </div>
        <div style="${cardStyle()}">
          ${transactions.map((t,i)=>{
            const txDate = t.createdAt ? new Date(t.createdAt) : null;
            const dateStr = txDate ? `${txDate.getDate()} ${MONTHS_SHORT[txDate.getMonth()]}` : "";
            return `
            <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:${i===transactions.length-1?"none":"1px solid #E8EAF0"}">
              <div style="width:40px;height:40px;border-radius:12px;background:${catColor(t.category)}18;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${catIcon(t.category)}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:600;color:#1A1D2E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.description}</div>
                <div style="font-size:11px;color:#8891A5;margin-top:2px;display:flex;align-items:center;gap:6px">
                  <span>${t.category}</span>
                  ${dateStr?`<span style="color:#C7D2FE">·</span><span>${dateStr}</span>`:""}
                  ${t.addedBy?`<span style="color:#C7D2FE">·</span><span style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.addedBy}</span>`:""}
                </div>
              </div>
              <div style="font-size:14px;font-weight:700;color:${t.type==="expense"?"#EF4444":"#10B981"};flex-shrink:0">${t.type==="expense"?"-":"+"}${fmt(t.amount)}</div>
              <button data-del="${t.id}" data-del-desc="${t.description}" data-del-amt="${fmt(t.amount)}" style="width:28px;height:28px;background:#FEE2E2;border:none;border-radius:8px;color:#EF4444;cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700">×</button>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }

    function renderBudget(income) {
      const effectiveBudgets = getEffectiveBudgets();
      const { month, year } = state;
      const overrides = state.budgetOverrides || {};
      const monthKey = "budget_" + year + "_" + month;
      const subTab = state.budgetSubTab || "budgets";
      const SHORT_M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      // Effective income carry-forward
      let effectiveIncome = income;
      for (let m=month, y=year, i=0; i<24; i++) {
        const k = "budget_" + y + "_" + m;
        if (overrides[k] && overrides[k]["__income__"] !== undefined) { effectiveIncome = overrides[k]["__income__"]; break; }
        if (m===0){m=11;y--;}else m--;
      }

      // Sub-tab pill toggle
      const pillStyle = (id) => "flex:1;padding:9px 0;border-radius:9px;border:none;cursor:pointer;" +
        "font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;transition:all .2s;" +
        "background:" + (subTab===id?"#FFFFFF":"transparent") + ";" +
        "color:" + (subTab===id?"#5B6EF5":"#8891A5") + ";" +
        "box-shadow:" + (subTab===id?"0 1px 4px #0000001a":"none");

      // ── BUDGETS content ─────────────────────────────────────────
      const budgetContent = "<div style=\"font-size:11px;color:#8891A5;margin-bottom:12px;padding:10px 14px;background:#EEF2FF;border-radius:10px;border:1px solid #C7D2FE;line-height:1.5\">" +
        "\uD83D\uDCA1 Budgets set here apply to <strong>this month and carry forward</strong> to all future months. Adjusting a future month only affects that month onwards." +
        "</div>" +
        // Income card
        "<div style=\"" + cardStyle() + "\">" +
          "<div style=\"display:flex;justify-content:space-between;align-items:center\">" +
            "<div>" +
              "<div style=\"font-weight:600;font-size:14px\">\uD83D\uDCB0 Base Monthly Income</div>" +
              "<div style=\"display:flex;align-items:center;gap:6px;margin-top:2px\">" +
                "<span style=\"color:#10B981;font-size:13px;font-weight:600\">" + fmt(effectiveIncome) + "</span>" +
                (overrides[monthKey] && overrides[monthKey]["__income__"] !== undefined

          const badge = isOverride

            : "<span style=\"font-size:10px;color:#8891A5;margin-left:6px\">carried fwd</span>";
          return "<div style=\"" + cardStyle() + "margin-top:10px\" id=\"cat-card-" + cat.name + "\">" +
            "<div style=\"display:flex;justify-content:space-between;align-items:center\">" +
              "<div style=\"display:flex;align-items:center;gap:10px\">" +
                "<span style=\"font-size:18px\">" + cat.icon + "</span>" +
                "<div>" +
                  "<div style=\"font-weight:600;font-size:14px\">" + cat.name + "</div>" +
                  "<div style=\"display:flex;align-items:center;gap:6px;margin-top:2px\">" +
                    "<span style=\"color:#8891A5;font-size:12px\">" + fmt(eff) + "</span>" + badge +
                  "</div>" +
                "</div>" +
              "</div>" +
              "<button data-cat=\"" + cat.name + "\" class=\"edit-cat-btn\" style=\"background:#F5F6FA;border:1px solid #E8EAF0;color:#1A1D2E;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit\">Set</button>" +
            "</div>" +
            "<div id=\"cat-form-" + cat.name + "\" style=\"display:none;margin-top:12px\">" +
              "<div style=\"display:flex;gap:8px\">" +
                "<input id=\"cat-input-" + cat.name + "\" type=\"number\" placeholder=\"Budget amount\" value=\"" + (eff||"") + "\" style=\"" + inputStyle() + "flex:1\" />" +
                "<button data-savecat=\"" + cat.name + "\" style=\"" + btnStyle(cat.color) + "width:auto;padding:11px 18px;margin-top:0\">Save</button>" +
              "</div>" +
            "</div>" +
          "</div>";
        }).join("");

      // ── RECURRING content ────────────────────────────────────────
      const rec = state.recurring || [];
      const totalRec = rec.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
      const CAL_DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      const recurringContent =
        "<div style=\"font-size:12px;color:#8891A5;margin-bottom:12px;line-height:1.5\">" +
          "These auto-post each month on the day you choose. Forecasted amounts appear on the Overview page." +
        "</div>" +
        // Summary strip
        (rec.length > 0
          ? "<div style=\"" + cardStyle() + "background:#1E2A3A;border:1px solid #2d3d50;margin-bottom:12px\">" +
              "<div style=\"font-size:9px;letter-spacing:2px;color:#94A3B8;text-transform:uppercase;margin-bottom:4px\">Total Monthly Recurring</div>" +
              "<div style=\"font-size:26px;font-weight:700;color:#F59E0B;letter-spacing:-0.5px\">" + fmt(totalRec) + "</div>" +
              "<div style=\"font-size:11px;color:#94A3B8;margin-top:4px\">" + rec.length + " active recurring expenses</div>" +
            "</div>"
          : "") +
        // Recurring items list
        (rec.length > 0
          ? rec.map((r, i) => {
              const c = CATEGORIES.find(x => x.name === r.category) || {icon:"\uD83D\uDCE6", color:"#9CA3AF"};
              return "<div style=\"" + cardStyle() + "display:flex;align-items:center;gap:12px;padding:12px 14px\">" +
                "<div style=\"width:36px;height:36px;border-radius:10px;background:" + c.color + "22;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0\">" + c.icon + "</div>" +
                "<div style=\"flex:1;min-width:0\">" +
                  "<div style=\"font-size:14px;font-weight:600\">" + r.name + "</div>" +
                  "<div style=\"font-size:11px;color:#8891A5;margin-top:1px\">" + r.category + " \u00B7 Day " + r.day + " \u00B7 <span style=\"color:#F59E0B;font-weight:600\">" + fmt(r.amount) + "/mo</span></div>" +
                "</div>" +
                "<button data-del-recurring=\"" + i + "\" style=\"width:28px;height:28px;background:#FEE2E2;border:none;border-radius:8px;color:#EF4444;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0\">\u00D7</button>" +
              "</div>";
            }).join("")
          : emptyState("\uD83D\uDD04", "No recurring expenses yet", "Add bills and subscriptions below")) +
        // Add new recurring form
        "<div style=\"" + cardStyle() + "margin-top:4px\">" +
          "<div style=\"font-size:11px;letter-spacing:1.5px;color:#8891A5;text-transform:uppercase;margin-bottom:12px\">Add New Recurring</div>" +
          "<div style=\"display:flex;flex-direction:column;gap:10px\">" +
            "<input id=\"rec-name\" placeholder=\"Name (e.g. Netflix, Rent)\" style=\"" + inputStyle() + "\" />" +
            "<input id=\"rec-amt\" type=\"number\" placeholder=\"Amount\" style=\"" + inputStyle() + "\" />" +
            "<select id=\"rec-cat\" style=\"" + inputStyle() + "appearance:none\">" +
              CATEGORIES.map(c => "<option value=\"" + c.name + "\">" + c.icon + " " + c.name + "</option>").join("") +
            "</select>" +
            "<div>" +
              "<div style=\"font-size:13px;color:#8891A5;margin-bottom:8px\">Day of month: <span id=\"rec-day-label\" style=\"color:#5B6EF5;font-weight:600\">Not selected</span></div>" +
              "<div id=\"rec-calendar\" style=\"background:#F5F6FA;border:1px solid #DDE0EA;border-radius:12px;padding:12px;\">" +
                "<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">" +
                  "<button id=\"cal-prev-month\" style=\"background:#E8EAF0;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px;color:#1A1D2E\">\u2039</button>" +
                  "<span id=\"cal-header\" style=\"font-size:13px;font-weight:600;color:#1A1D2E\"></span>" +
                  "<button id=\"cal-next-month\" style=\"background:#E8EAF0;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px;color:#1A1D2E\">\u203A</button>" +
                "</div>" +
                "<div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:6px\">" +
                  CAL_DAYS.map(d => "<div style=\"font-size:9px;color:#8891A5;font-weight:600;padding:3px 0\">" + d + "</div>").join("") +
                "</div>" +
                "<div id=\"cal-days\" style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center\"></div>" +
              "</div>" +
              "<input type=\"hidden\" id=\"rec-day\" value=\"\" />" +
            "</div>" +
            "<button id=\"add-recurring-btn\" style=\"" + btnStyle() + "\">Add Recurring Expense</button>" +
          "</div>" +
        "</div>";

      return "<div style=\"padding:16px 20px 0\">" +
        // Sub-tab pill toggle
        "<div style=\"display:flex;background:#F5F6FA;border-radius:12px;padding:4px;margin-bottom:16px;border:1px solid #E8EAF0\">" +
          "<button data-subtab=\"budgets\" style=\"" + pillStyle("budgets") + "\">\uD83C\uDFAF Budgets</button>" +
          "<button data-subtab=\"recurring\" style=\"" + pillStyle("recurring") + "\">\uD83D\uDD04 Recurring</button>" +
        "</div>" +
        (subTab === "budgets" ? budgetContent : recurringContent) +
      "</div>";
    }

    function bindAddForm() {
      let txType = "expense";
      const updateTypeUI = () => {
        document.getElementById("type-expense").style.background = txType==="expense"?"#5B6EF5":"#F5F6FA";
        document.getElementById("type-expense").style.color      = txType==="expense"?"#fff":'#8891A5';
        document.getElementById("type-income").style.background  = txType==="income"?"#10B981":"#F5F6FA";
        document.getElementById("type-income").style.color       = txType==="income"?"#fff":'#8891A5';
        document.getElementById("add-tx-btn").style.background   = txType==="expense"?"#5B6EF5":"#10B981";
        document.getElementById("add-tx-btn").textContent        = `Add ${txType==="expense"?"Expense":"Income"}`;
      };
      const toggleTypeUI = () => {
        const isIncome = txType === "income";
        document.getElementById("cat-row").style.display    = isIncome ? "none" : "block";
        document.getElementById("income-note").style.display = isIncome ? "block" : "none";
      };
      document.getElementById("type-expense").onclick = () => { txType="expense"; updateTypeUI(); toggleTypeUI(); };
      document.getElementById("type-income").onclick  = () => { txType="income";  updateTypeUI(); toggleTypeUI(); };
      document.getElementById("add-tx-btn").onclick = async () => {
        const desc = document.getElementById("tx-desc").value.trim();
        const amt  = document.getElementById("tx-amt").value;
        const cat  = txType==="expense" ? document.getElementById("tx-cat").value : "Income";
        if (!desc || !amt || isNaN(parseFloat(amt))) { showToast("Please fill all fields","error"); return; }
        const btn = document.getElementById("add-tx-btn");
        btn.textContent="Saving…"; btn.disabled=true;
        await addTransaction(desc, amt, cat, txType);
        showToast("Transaction added!");
        document.getElementById("tx-desc").value="";
        document.getElementById("tx-amt").value="";
        btn.textContent=`Add ${txType==="expense"?"Expense":"Income"}`; btn.disabled=false;
      };
    }

    function bindDeleteButtons() {
      const modal    = document.getElementById("delete-modal");
      const descEl   = document.getElementById("delete-modal-desc");
      const cancelBtn  = document.getElementById("delete-cancel-btn");
      const confirmBtn = document.getElementById("delete-confirm-btn");
      let pendingId = null;

      const closeModal = () => { modal.style.display="none"; pendingId=null; };
      if (cancelBtn)  cancelBtn.onclick  = closeModal;
      if (modal)      modal.onclick = (e) => { if(e.target===modal) closeModal(); };
      if (confirmBtn) confirmBtn.onclick = async () => {
        if (pendingId) {
          confirmBtn.textContent="Deleting…"; confirmBtn.disabled=true;
          await deleteTransaction(pendingId);
          closeModal();
        }
      };

      document.querySelectorAll("[data-del]").forEach(btn => {
        btn.onclick = () => {
          pendingId = btn.dataset.del;
          const desc = btn.dataset.delDesc || "this transaction";
          const amt  = btn.dataset.delAmt  || "";
          if (descEl) descEl.innerHTML = `Are you sure you want to delete <strong>${desc}</strong>${amt?" ("+amt+")":""}? This cannot be undone.`;
          if (modal) modal.style.display = "flex";
        };
      });
    }

    function bindBudgetForm(income) {
      // Sub-tab switching
      document.querySelectorAll("[data-subtab]").forEach(btn => {
        btn.onclick = () => { state.budgetSubTab = btn.dataset.subtab; render(); };
      });
      let incomeOpen = false;
      document.getElementById("edit-income-btn").onclick = () => {
        incomeOpen = !incomeOpen;
        document.getElementById("income-form").style.display = incomeOpen?"block":"none";
        document.getElementById("edit-income-btn").textContent = incomeOpen?"Cancel":"Edit";
      };
      document.getElementById("save-income-btn").onclick = async () => {
        const val = parseFloat(document.getElementById("income-input").value)||0;
        await saveMonthBudget("__income__", val);
        showToast("Income saved & carries forward!");
        incomeOpen=false;
        document.getElementById("income-form").style.display="none";
        document.getElementById("edit-income-btn").textContent="Set";
        render();
      };
      document.querySelectorAll(".edit-cat-btn").forEach(btn => {

          document.getElementById(`cat-card-${cat}`).querySelector(".edit-cat-btn").textContent="Set";

        };
      });
