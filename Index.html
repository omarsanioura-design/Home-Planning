    // ── Graphs ───────────────────────────────
    function renderGraphs(allTransactions, selectedCat, graphType, graphYear) {
      const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const currentYear = graphYear || state.year;
      // Build monthly totals for selected category YTD
      const monthlyData = SHORT_MONTHS.map((m, i) => {
        const total = allTransactions
          .filter(t => t.type==="expense" && t.category===selectedCat && t.year===currentYear && t.month===i)
          .reduce((s,t)=>s+t.amount, 0);
        return { month: m, total };
      });
      const currentRealMonth = new Date().getMonth();
      const currentRealYear  = new Date().getFullYear();

      // Find first and last months that have data
      const allMonthTotals = monthlyData.map(d => d.total);
      let firstDataMonth = allMonthTotals.findIndex(t => t > 0);
      let lastDataMonth  = allMonthTotals.map((t,i) => t > 0 ? i : -1).filter(i => i >= 0).pop();

      // If no data at all, show only months up to current real month (for current year)
      // or all 12 months (for past years)
      if (firstDataMonth === -1) {
        if (currentYear === currentRealYear) {
          firstDataMonth = 0;
          lastDataMonth  = currentRealMonth;
        } else {
          firstDataMonth = 0;
          lastDataMonth  = 11;
        }
      } else {
        // For the current year, never show beyond the current real month
        if (currentYear === currentRealYear) {
          lastDataMonth = Math.min(lastDataMonth, currentRealMonth);
        }
      }

      const ytdMonths = monthlyData.filter((_,i) => i >= firstDataMonth && i <= lastDataMonth);
      const maxVal = Math.max(...ytdMonths.map(d=>d.total), 1);
      const chartH = 160;
      const chartW = 320;
      const padL = 52, padB = 28, padT = 16, padR = 16;
      const innerW = chartW - padL - padR;
      const innerH = chartH - padB - padT;
      const n = ytdMonths.length;
      const cat = CATEGORIES.find(c=>c.name===selectedCat) || {color:"#e94560"};

      // Y axis labels (4 steps)
      const ySteps = 4;
      const yLabels = Array.from({length:ySteps+1},(_,i)=>{
        const val = (maxVal/ySteps)*i;
        return val>=1000 ? "$"+(val/1000).toFixed(1)+"k" : "$"+Math.round(val);
      });

      let chartContent = "";
      const selCat = state.selectedCatMonth;
      const tooltipSVG = (cx, cy, label, value, color, maxX) => {
        const TW=90, TH=36;
        const tx = Math.min(Math.max(cx-TW/2, padL), maxX-TW);
        const ty = cy - TH - 10 < padT ? cy+14 : cy-TH-10;
        return `<line x1="${cx}" y1="${padT}" x2="${cx}" y2="${padT+innerH}" stroke="${color}" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
          <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="${TH}" rx="6" fill="#1E2A3A" opacity="0.95"/>
          <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+13).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="DM Sans,sans-serif" font-weight="600">${label}</text>
          <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+27).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="12" font-family="DM Sans,sans-serif" font-weight="700">${value}</text>`;
      };
      if (graphType === "bar") {
        const barW = Math.max(6, (innerW / n) * 0.55);
        const gap   = innerW / n;
        const barGap = innerW / n;
        const hitBarW = barGap;
        const barItems = ytdMonths.map((d,i)=>{
          const barH = d.total > 0 ? (d.total/maxVal)*innerH : 2;
          const x = padL + barGap*i + barGap/2 - barW/2;
          const y = padT + innerH - barH;
          const cx = x + barW/2;
          const selected = selCat === i;
          return `<g onclick="window.setCatMonth(${i})" style="cursor:pointer">
            <rect x="${(padL+barGap*i).toFixed(1)}" y="${padT}" width="${hitBarW.toFixed(1)}" height="${innerH+28}" fill="transparent"/>
            <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}"
              rx="3" fill="${cat.color}" opacity="${selected?1:0.75}" ${selected?`stroke="${cat.color}" stroke-width="2"`:""} />
            <text x="${cx.toFixed(1)}" y="${(padT+innerH+18).toFixed(1)}" text-anchor="middle"
              fill="${selected?cat.color:'#8891A5'}" font-size="9" font-weight="${selected?'700':'400'}" font-family="DM Sans,sans-serif">${d.month}</text>
          </g>`;
        });
        // Render tooltip last so it always appears on top of all bars
        let selBarTooltip = "";
        if (selCat !== null && ytdMonths[selCat]) {
          const d = ytdMonths[selCat];
          const barH = d.total > 0 ? (d.total/maxVal)*innerH : 2;
          const x = padL + barGap*selCat + barGap/2 - barW/2;
          const y = padT + innerH - barH;
          const cx = x + barW/2;
          const label=`${d.month} · ${selectedCat}`, value=fmt(d.total);
          const TW=Math.max(Math.max(label.length, value.length)*7+24, 100);
          const TH=38;
          const tx = Math.min(Math.max(cx-TW/2, padL), chartW-padR-TW);
          const ty = Math.max(y - TH - 8, padT);
          selBarTooltip = `
            <line x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${(padT+innerH).toFixed(1)}" stroke="${cat.color}" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>
            <rect x="${(tx-1).toFixed(1)}" y="${(ty-1).toFixed(1)}" width="${TW+2}" height="${TH+2}" rx="7" fill="#1E2A3A"/>
            <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="${TH}" rx="6" fill="#1E2A3A"/>
            <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="${TH}" rx="6" fill="none" stroke="#3a4a5e" stroke-width="1"/>
            <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+13).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="DM Sans,sans-serif" font-weight="600">${label}</text>
            <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+28).toFixed(1)}" text-anchor="middle" fill="${cat.color}" font-size="13" font-family="DM Sans,sans-serif" font-weight="700">${value}</text>`;
        }
        chartContent = barItems.join("") + selBarTooltip;
      } else {
        const pts = ytdMonths.map((d,i)=>{
          const gap = innerW/Math.max(n-1,1);
          const x = padL + (n===1 ? innerW/2 : gap*i);
          const y = padT + innerH - (d.total/maxVal)*innerH;
          return {x,y,d};
        });
        const linePath = pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
        const areaPath = pts.length ? `M${pts[0].x.toFixed(1)},${(padT+innerH).toFixed(1)} ` +
          pts.map(p=>`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ") +
          ` L${pts[pts.length-1].x.toFixed(1)},${(padT+innerH).toFixed(1)} Z` : "";
        chartContent = `
          <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${cat.color}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${cat.color}" stop-opacity="0"/>
          </linearGradient></defs>
          <path d="${areaPath}" fill="url(#areaGrad)"/>
          <path d="${linePath}" fill="none" stroke="${cat.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${pts.map((p,i)=>{
            const selected = selCat === i;
            const hitW = Math.max(innerW/Math.max(n-1,1), 28);
            const lbl=`${p.d.month} · ${selectedCat}`, val=fmt(p.d.total);
            const TW=Math.max(Math.max(lbl.length, val.length)*7+24, 100);
            const TH=38;
            const tx = Math.min(Math.max(p.x-TW/2, padL), chartW-padR-TW);
            const belowY = p.y + 12;
            const ty = belowY + TH > padT+innerH ? p.y - TH - 8 : belowY;
            const tooltip = selected ? `
              <line x1="${p.x.toFixed(1)}" y1="${padT}" x2="${p.x.toFixed(1)}" y2="${(padT+innerH).toFixed(1)}" stroke="${cat.color}" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>
              <rect x="${(tx-1).toFixed(1)}" y="${(ty-1).toFixed(1)}" width="${TW+2}" height="${TH+2}" rx="7" fill="#1E2A3A"/>
              <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="${TH}" rx="6" fill="#1E2A3A"/>
              <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="${TH}" rx="6" fill="none" stroke="#3a4a5e" stroke-width="1"/>
              <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+13).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="DM Sans,sans-serif" font-weight="600">${lbl}</text>
              <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+28).toFixed(1)}" text-anchor="middle" fill="${cat.color}" font-size="13" font-family="DM Sans,sans-serif" font-weight="700">${val}</text>` : "";
            return `<g onclick="window.setCatMonth(${i})" style="cursor:pointer">
              <rect x="${(p.x-hitW/2).toFixed(1)}" y="${padT}" width="${hitW.toFixed(1)}" height="${innerH+28}" fill="transparent"/>
              <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${selected?5.5:3.5}" fill="${cat.color}" ${selected?'stroke="#fff" stroke-width="2"':""} />
              <text x="${p.x.toFixed(1)}" y="${(padT+innerH+18).toFixed(1)}" text-anchor="middle"
                fill="${selected?cat.color:'#8891A5'}" font-size="9" font-weight="${selected?'700':'400'}" font-family="DM Sans,sans-serif">${p.d.month}</text>
              ${tooltip}
            </g>`;
          }).join("")}`;
      }

      // Y grid lines + labels
      const gridLines = Array.from({length:ySteps+1},(_,i)=>{
        const y = padT + innerH - (innerH/ySteps)*i;
        return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${chartW-padR}" y2="${y.toFixed(1)}"
          stroke="#E8EAF0" stroke-width="1"/>
          <text x="${(padL-6).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end"
            fill='#8891A5' font-size="9" font-family="DM Sans,sans-serif">${yLabels[i]}</text>`;
      }).join("");

      const ytdTotal = ytdMonths.reduce((s,d)=>s+d.total,0);
      const avg = n>0 ? ytdTotal/n : 0;

      // Budget vs Expenses dual-line data
      // Use effective budgets for current graph year/month so BvE matches Overview
      const monthlyBudgetTotal = Object.values(getEffectiveBudgets()).reduce((s,v)=>s+v,0);
      // Build full year BvE data — use allTransactions so all months are included
      const bveAllData = SHORT.map((m,i) => {
        const monthExp = allTransactions
          .filter(t => t.type==="expense" && t.year===currentYear && t.month===i)
          .reduce((s,t)=>s+t.amount, 0);
        return { month:m, expenses:monthExp, budget:monthlyBudgetTotal };
      });

      // Trim to first → last month with any expense data
      const bveCurrentRealMonth = new Date().getMonth();
      const bveCurrentRealYear  = new Date().getFullYear();
      let bveFirst = bveAllData.findIndex(d => d.expenses > 0);
      let bveLast  = bveAllData.map((d,i) => d.expenses > 0 ? i : -1).filter(i => i >= 0).pop();
      if (bveFirst === -1) {
        bveFirst = 0;
        bveLast  = currentYear === bveCurrentRealYear ? bveCurrentRealMonth : 11;
      } else if (currentYear === bveCurrentRealYear) {
        bveLast = Math.min(bveLast, bveCurrentRealMonth);
      }
      const bveData = bveAllData.filter((_,i) => i >= bveFirst && i <= bveLast);
      const bveN   = bveData.length;
      const bveMax = Math.max(...bveData.map(d=>Math.max(d.expenses,d.budget)), 1);
      const avgMonthlyExp = bveN>0 ? Math.round(bveData.reduce((s,d)=>s+d.expenses,0)/bveN) : 0;
      const bveGap = innerW / Math.max(bveN-1,1);
      const bveYLabels = Array.from({length:ySteps+1},(_,i)=>{ const v=(bveMax/ySteps)*i; return v>=1000?"$"+(v/1000).toFixed(1)+"k":"$"+Math.round(v); });
      const bveGridLines = Array.from({length:ySteps+1},(_,i)=>{
        const y=padT+innerH-(innerH/ySteps)*i;
        return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${chartW-padR}" y2="${y.toFixed(1)}" stroke="#E8EAF0" stroke-width="1"/>
          <text x="${(padL-6).toFixed(1)}" y="${(y+3).toFixed(1)}" text-anchor="end" fill='#8891A5' font-size="9" font-family="DM Sans,sans-serif">${bveYLabels[i]}</text>`;
      }).join("");
      const bvePts = (series) => bveData.map((d,i) => ({
        x: padL+(bveN===1?innerW/2:bveGap*i),
        y: padT+innerH-(d[series]/bveMax)*innerH,
        d
      }));
      const budgetPts  = bvePts("budget");
      const expensePts = bvePts("expenses");
      const budgetPath  = budgetPts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      const expensePath = expensePts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      const bveMonthLabels = bveData.map((d,i)=>{
        const x=padL+(bveN===1?innerW/2:bveGap*i);
        return `<text x="${x.toFixed(1)}" y="${(padT+innerH+18).toFixed(1)}" text-anchor="middle" fill='#8891A5' font-size="9" font-family="DM Sans,sans-serif">${d.month}</text>`;
      }).join("");
      const selBve = state.selectedBveMonth;
      const bveHitW = Math.max(innerW/Math.max(bveN-1,1), 28);
      const bveClickDots = bveData.map((d,i)=>{
        const bp=budgetPts[i], ep=expensePts[i], selected=selBve===i;
        const budgetStr=fmt(d.budget), expStr=fmt(d.expenses);
        const colW=Math.max(budgetStr.length, expStr.length, 8)*8+24;
        const TW=Math.max(colW*2, 150);
        const cx=ep.x;
        const tx=Math.min(Math.max(cx-TW/2,padL),chartW-padR-TW);
        const lowerY=Math.max(bp.y,ep.y);
        const ty = lowerY+12+68 > padT+innerH ? lowerY-76 : lowerY+12;
        const tooltip = selected ? `
          <line x1="${cx.toFixed(1)}" y1="${padT}" x2="${cx.toFixed(1)}" y2="${(padT+innerH).toFixed(1)}" stroke='#8891A5' stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
          <rect x="${(tx-1).toFixed(1)}" y="${(ty-1).toFixed(1)}" width="${TW+2}" height="68" rx="9" fill="#1E2A3A"/>
          <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="66" rx="8" fill="#1E2A3A"/>
          <rect x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" width="${TW}" height="66" rx="8" fill="none" stroke="#3a4a5e" stroke-width="1"/>
          <text x="${(tx+TW/2).toFixed(1)}" y="${(ty+14).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="9" font-family="DM Sans,sans-serif" font-weight="600">${d.month}</text>
          <line x1="${(tx+8).toFixed(1)}" y1="${(ty+20).toFixed(1)}" x2="${(tx+TW-8).toFixed(1)}" y2="${(ty+20).toFixed(1)}" stroke="#3a4a5e" stroke-width="0.75"/>
          <text x="${(tx+TW/4).toFixed(1)}" y="${(ty+35).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="DM Sans,sans-serif">Budget</text>
          <text x="${(tx+TW/4).toFixed(1)}" y="${(ty+52).toFixed(1)}" text-anchor="middle" fill="#3B82F6" font-size="13" font-family="DM Sans,sans-serif" font-weight="700">${fmt(d.budget)}</text>
          <line x1="${(tx+TW/2).toFixed(1)}" y1="${(ty+22).toFixed(1)}" x2="${(tx+TW/2).toFixed(1)}" y2="${(ty+58).toFixed(1)}" stroke="#3a4a5e" stroke-width="0.75"/>
          <text x="${(tx+TW*3/4).toFixed(1)}" y="${(ty+35).toFixed(1)}" text-anchor="middle" fill="#94A3B8" font-size="8" font-family="DM Sans,sans-serif">Expenses</text>
          <text x="${(tx+TW*3/4).toFixed(1)}" y="${(ty+52).toFixed(1)}" text-anchor="middle" fill="#EF4444" font-size="13" font-family="DM Sans,sans-serif" font-weight="700">${fmt(d.expenses)}</text>` : "";
        return `<g onclick="window.setBveMonth(${i})" style="cursor:pointer">
          <rect x="${(cx-bveHitW/2).toFixed(1)}" y="${padT}" width="${bveHitW.toFixed(1)}" height="${innerH+28}" fill="transparent"/>
          <circle cx="${bp.x.toFixed(1)}" cy="${bp.y.toFixed(1)}" r="${selected?4.5:3}" fill="#3B82F6" ${selected?'stroke="#fff" stroke-width="1.5"':""} />
          <circle cx="${ep.x.toFixed(1)}" cy="${ep.y.toFixed(1)}" r="${selected?5.5:3.5}" fill="#EF4444" ${selected?'stroke="#fff" stroke-width="1.5"':""} />
          ${tooltip}
        </g>`;
      }).join("");

      return `<div style="padding:16px 20px 0">
        ${sectionTitle("Spending Graphs &middot; " + currentYear)}
        <!-- Category selector -->
        <div style="${cardStyle()}margin-bottom:10px">
          <div style="font-size:11px;color:#8888aa;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Category</div>
          <select id="graph-cat-select" style="${inputStyle()}">
            ${CATEGORIES.map(c=>`<option value="${c.name}" ${c.name===selectedCat?"selected":""}>${c.icon} ${c.name}</option>`).join("")}
          </select>
        </div>
        <!-- Graph type toggle + chart -->
        <div style="${cardStyle()}">
          <!-- Toggle -->
          <div style="display:flex;gap:8px;margin-bottom:16px">
            <button id="graph-bar-btn" style="flex:1;padding:8px;border-radius:10px;border:none;background:${graphType==="bar"?"#5B6EF5":"#F5F6FA"};color:${graphType==="bar"?"#fff":'#8891A5'};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s">Bar</button>
            <button id="graph-line-btn" style="flex:1;padding:8px;border-radius:10px;border:none;background:${graphType==="line"?"#5B6EF5":"#F5F6FA"};color:${graphType==="line"?"#fff":'#8891A5'};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s">Line</button>
          </div>
          <!-- SVG Chart -->
          <svg width="100%" viewBox="0 0 ${chartW} ${chartH}" style="overflow:visible;display:block">
            ${gridLines}
            ${chartContent}
          </svg>
        </div>
        <!-- YTD summary -->
        <div style="${cardStyle()}margin-top:10px;display:flex;align-items:stretch">
          <div style="flex:1 1 0;min-width:0">
            <div style="font-size:9px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;white-space:nowrap">YTD Total</div>
            <div style="font-size:18px;font-weight:700;color:${cat.color};white-space:nowrap">${fmt(ytdTotal)}</div>
          </div>
          <div style="width:1px;background:#E8EAF0;flex-shrink:0;margin:0 16px"></div>
          <div style="flex:1 1 0;min-width:0;text-align:right">
            <div style="font-size:9px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;white-space:nowrap">Monthly Avg</div>
            <div style="font-size:18px;font-weight:700;white-space:nowrap">${fmt(avg)}</div>
          </div>
        </div>

        <!-- Budget vs Expenses dual-line chart -->
        <div style="font-size:11px;letter-spacing:2px;color:#8888aa;text-transform:uppercase;margin:16px 0 12px">Budget vs Expenses</div>
        <div style="${cardStyle()}">
          <!-- Legend -->
          <div style="display:flex;gap:20px;margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:20px;height:2px;background:#3B82F6;border-radius:2px"></div>
              <span style="font-size:11px;color:#8888aa">Budget</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:20px;height:2px;background:#FF6B6B;border-radius:2px"></div>
              <span style="font-size:11px;color:#8888aa">Expenses</span>
            </div>
          </div>
          <svg width="100%" viewBox="0 0 ${chartW} ${chartH}" style="overflow:visible;display:block">
            ${bveGridLines}
            ${bveMonthLabels}
            <path d="${budgetPath}" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5,3"/>
            <path d="${expensePath}" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
            ${bveClickDots}
          </svg>
        </div>
        <!-- Budget vs Expenses summary -->
        <div style="${cardStyle()}margin-top:10px;display:flex;align-items:stretch">
          <div style="flex:1 1 0;min-width:0">
            <div style="font-size:9px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;color:#3B82F6;white-space:nowrap">Avg Budget</div>
            <div style="font-size:18px;font-weight:700;color:#3B82F6;white-space:nowrap">${fmt(monthlyBudgetTotal)}</div>
          </div>
          <div style="width:1px;background:#E8EAF0;flex-shrink:0;margin:0 16px"></div>
          <div style="flex:1 1 0;min-width:0;text-align:right">
            <div style="font-size:9px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;color:#EF4444;white-space:nowrap">Avg Expenses</div>
            <div style="font-size:18px;font-weight:700;color:#EF4444;white-space:nowrap">${fmt(avgMonthlyExp)}</div>
          </div>
        </div>
      </div>`;
    }

    function bindGraphs() {
      const catSel = document.getElementById("graph-cat-select");
      if (catSel) catSel.onchange = () => { state.graphCat=catSel.value; state.selectedCatMonth=null; render(); };
      const barBtn  = document.getElementById("graph-bar-btn");
      const lineBtn = document.getElementById("graph-line-btn");
      if (barBtn)  barBtn.onclick  = () => { state.graphType="bar";  state.selectedCatMonth=null; render(); };
      if (lineBtn) lineBtn.onclick = () => { state.graphType="line"; state.selectedCatMonth=null; render(); };
      window.setCatMonth = (i) => { state.selectedCatMonth = state.selectedCatMonth===i ? null : i; render(); };
      window.setBveMonth = (i) => { state.selectedBveMonth = state.selectedBveMonth===i ? null : i; render(); };
    }

    // ── Recurring tab ─────────────────────────────────────────
    function renderRecurring() {
      const recurring = state.recurring || [];
      const catOptions = CATEGORIES.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join("");
      const rows = recurring.length ? recurring.map((r,i)=>`
        <div style="${cardStyle()}display:flex;align-items:center;gap:12px;padding:12px 14px">
          <div style="width:36px;height:36px;border-radius:10px;background:${(CATEGORIES.find(c=>c.name===r.category)||{color:"#999"}).color}22;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">
            ${(CATEGORIES.find(c=>c.name===r.category)||{icon:"📦"}).icon}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${r.name}</div>
            <div style="font-size:11px;color:#8891A5;margin-top:1px">${r.category} · Day ${r.day} · ${fmt(r.amount)}/mo</div>
          </div>
          <button data-del-recurring="${i}" style="background:none;border:none;color:#EF4444;cursor:pointer;font-size:18px;padding:0 0 0 8px;flex-shrink:0">×</button>
        </div>`).join("") :
        emptyState("🔄","No recurring expenses set","Add bills, subscriptions or regular payments");

      return `<div style="padding:16px 20px 0">
        ${sectionTitle("Recurring Expenses")}
        <div style="font-size:12px;color:#8891A5;margin-bottom:12px;line-height:1.5">
          Set recurring expenses and they will auto-post each month on the day you choose. Forecasted amounts appear on the Overview page.
        </div>
        <!-- Add new recurring -->
        <div style="${cardStyle()}margin-bottom:14px">
          <div style="font-size:11px;letter-spacing:1.5px;color:#8891A5;text-transform:uppercase;margin-bottom:12px">Add New Recurring</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <input id="rec-name" placeholder="Name (e.g. Netflix, Rent)" style="${inputStyle()}" />
            <input id="rec-amt" type="number" placeholder="Amount" style="${inputStyle()}" />
            <select id="rec-cat" style="${inputStyle()}appearance:none">${catOptions}</select>
            <div>
              <div style="font-size:13px;color:#8891A5;margin-bottom:8px">Day of month: <span id="rec-day-label" style="color:#5B6EF5;font-weight:600">Not selected</span></div>
              <div id="rec-calendar" style="background:#F5F6FA;border:1px solid #DDE0EA;border-radius:12px;padding:12px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                  <button id="cal-prev-month" style="background:#E8EAF0;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px;color:#1A1D2E">‹</button>
                  <span id="cal-header" style="font-size:13px;font-weight:600;color:#1A1D2E"></span>
                  <button id="cal-next-month" style="background:#E8EAF0;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:14px;color:#1A1D2E">›</button>
                </div>
                <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:6px">
                  ${["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div style="font-size:9px;color:#8891A5;font-weight:600;padding:3px 0">${d}</div>`).join("")}
                </div>
                <div id="cal-days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center"></div>
              </div>
              <input type="hidden" id="rec-day" value="" />
            </div>
            <button id="add-recurring-btn" style="${btnStyle()}">Add Recurring Expense</button>
          </div>
        </div>
        ${rows}
      </div>`;
    }

    function bindRecurring() {
      // ── Mini calendar state ──
      const now = new Date();
      let calYear  = now.getFullYear();
      let calMonth = now.getMonth();
      const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      function renderCalendar() {
        const header  = document.getElementById("cal-header");
        const daysEl  = document.getElementById("cal-days");
        const selDay  = parseInt(document.getElementById("rec-day").value) || 0;
        if (!header || !daysEl) return;
        header.textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
        let html = "";
        // Empty cells before first day
        for (let i=0; i<firstDay; i++) html += `<div></div>`;
        // Day cells
        for (let d=1; d<=daysInMonth; d++) {
          const isSelected = d === selDay;
          const isToday = d === now.getDate() && calMonth === now.getMonth() && calYear === now.getFullYear();
          html += `<div data-cal-day="${d}" style="
            padding:5px 2px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:${isSelected?"700":"400"};
            background:${isSelected?"#5B6EF5":isToday?"#EEF2FF":"transparent"};
            color:${isSelected?"#fff":isToday?"#5B6EF5":"#1A1D2E"};
            border:${isSelected?"none":isToday?"1px solid #C7D2FE":"1px solid transparent"};
            transition:all .15s;
          ">${d}</div>`;
        }
        daysEl.innerHTML = html;
        // Bind day clicks
        daysEl.querySelectorAll("[data-cal-day]").forEach(el => {
          el.onmouseenter = () => { if (el.style.background !== "rgb(91, 110, 245)") el.style.background="#E8EAF0"; };
          el.onmouseleave = () => { if (el.style.background !== "rgb(91, 110, 245)") el.style.background="transparent"; };
          el.onclick = () => {
            const day = parseInt(el.dataset.calDay);
            document.getElementById("rec-day").value = day;
            const label = document.getElementById("rec-day-label");
            if (label) label.textContent = `${MONTH_NAMES[calMonth]} ${day}`;
            renderCalendar();
          };
        });
      }

      // Prev/next month buttons
      const prevBtn = document.getElementById("cal-prev-month");
      const nextBtn = document.getElementById("cal-next-month");
      if (prevBtn) prevBtn.onclick = () => { if(calMonth===0){calMonth=11;calYear--;}else calMonth--; renderCalendar(); };
      if (nextBtn) nextBtn.onclick = () => { if(calMonth===11){calMonth=0;calYear++;}else calMonth++; renderCalendar(); };

      // Initial render
      renderCalendar();

      // ── Add button ──
      document.getElementById("add-recurring-btn").onclick = async () => {
        const name = document.getElementById("rec-name").value.trim();
        const amt  = document.getElementById("rec-amt").value;
        const cat  = document.getElementById("rec-cat").value;
        const day  = parseInt(document.getElementById("rec-day").value) || 0;
        if (!name || !amt || isNaN(parseFloat(amt))) { showToast("Please fill all fields","error"); return; }
        if (!day) { showToast("Please select a day on the calendar","error"); return; }
        const newItem = { id: Date.now().toString(), name, amount: parseFloat(amt), category: cat, day, active: true };
        const updated = [...(state.recurring||[]), newItem];
        await saveRecurring(updated);
        showToast("Recurring expense added!");
        document.getElementById("rec-name").value="";
        document.getElementById("rec-amt").value="";
        document.getElementById("rec-day").value="";
        render();
      };

      document.querySelectorAll("[data-del-recurring]").forEach(btn => {
        btn.onclick = async () => {
          const idx = parseInt(btn.dataset.delRecurring);
          const updated = state.recurring.filter((_,i)=>i!==idx);
          await saveRecurring(updated);
          showToast("Recurring expense removed");
          render();
        };
      });
    }

    // ── Style helpers ─────────────────────────
    function inputStyle() { return "width:100%;background:#F5F6FA;border:1px solid #DDE0EA;border-radius:10px;padding:11px 14px;color:#1A1D2E;font-size:14px;box-sizing:border-box;font-family:'DM Sans',sans-serif;outline:none;"; }
    function btnStyle(color="#5B6EF5") { return `width:100%;padding:13px;border-radius:12px;border:none;background:${color};color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;`; }
    function cardStyle() { return "background:#FFFFFF;border-radius:16px;padding:16px;margin-bottom:0;border:1px solid #E8EAF0;box-shadow:0 1px 4px #0000000a;"; }
    function sectionTitle(t) { return `<div style="font-size:11px;letter-spacing:2px;color:#8891A5;text-transform:uppercase;margin-bottom:12px">${t}</div>`; }
    function emptyState(icon,line1,line2) { return "<div style=\""+cardStyle()+"text-align:center;color:#8891A5;padding:30px 16px\"><div style=\"font-size:32px;margin-bottom:8px\">"+icon+"</div><div>"+line1+"</div>"+(line2?"<div style=\"font-size:12px;margin-top:4px\">"+line2+"</div>":"")+"</div>"; }

    // ── Boot ──────────────────────────────────
    render();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #F5F6FA; overscroll-behavior: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input::placeholder { color: #5a5a7a; }
    input:focus { border-color: #5B6EF560 !important; }
    select option { background: #FFFFFF; color: #1A1D2E; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #DDE0EA; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
